<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance</title>
    
    <!-- Google Fonts - Orbitron -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            padding: 20px;              /* biar gak nempel pinggir */
        }

        .maintenance-container {
            text-align: center;
        }

        .maintenance-text {
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;          /* dikecilin buat hp */
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .sub-text {
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;          /* kecil cocok buat layar hp */
            font-weight: 400;
            letter-spacing: 0.5px;
            opacity: 0.8;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="maintenance-text">maintenance</div>
        <div class="sub-text">currently under update, comeback later.</div>
    </div>
</body>
</html>
